<!doctype html> 
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rock Paper Scissors</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../Styles/10-rock-paper-scissors.css">
</head>

<body>

  <!-- TITLE -->
  <p class="title">Rock Paper Scissors</p>

  <!-- BUTTONS -->
  <button onclick="updatetheresult('Rock')" class="btn1">
    <img class="move-icon" src="../Styles/rock-emoji.png" alt="Rock">
  </button>

  <button onclick="updatetheresult('Paper')" class="btn2">
    <img class="move-icon" src="../Styles/paper-emoji.png" alt="Paper">
  </button>

  <button onclick="updatetheresult('Scissors')" class="btn3">
    <img class="move-icon" src="../Styles/scissors-emoji.png" alt="Scissors">
  </button>

  <!-- RESULT -->
  <p class="result-js"></p>

  <!-- MOVES -->
  <p class="js-move"></p>

  <!-- SCORE -->
  <p class="score-js"></p>

  <!-- RESET BUTTON -->
  <button 
    onclick="
      score.wins = 0; 
      score.losses = 0;
      score.tie = 0;  

      localStorage.removeItem('score');
      localStorage.removeItem('result');
      localStorage.removeItem('movs');

      updatethescore();

      document.querySelector('.result-js').innerText = '';
      document.querySelector('.js-move').innerText = '';
    " 
    class="rstbtn">
    Reset Score
  </button>

  <!-- JS -->
  <script src="../Scripts/10-rock-paper-scissors.js"></script>

</body>
</html>
